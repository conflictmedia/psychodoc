name: Build + Deploy Next.js site to Pages (release only)

on:
  push:
    branches: ['release', 'develop']
  pull_request:
    branches: ['release', 'develop']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Only needed for an actual Pages deployment build
      - name: Setup Pages
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/release' }}
        uses: actions/configure-pages@v4

      - name: Build with Next.js
        run: npm run build

      # Only upload the special Pages artifact when we intend to deploy
      - name: Upload Pages artifact (release pushes only)
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/release' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

  deploy:

    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/release' }}

    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write


    concurrency:
      group: 'pages-release'
      cancel-in-progress: true

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
